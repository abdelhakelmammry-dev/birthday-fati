<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Fati</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;

background:
radial-gradient(circle at top left,#ffd6e7 0%,transparent 30%),
radial-gradient(circle at bottom right,#ffc1da 0%,transparent 30%),
linear-gradient(135deg,#f9c5d5,#f6b7cb,#f8cddd);
}

.card{
padding:40px 55px;
border-radius:30px;
background:rgba(255,240,246,0.6);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 15px 40px rgba(172,67,109,0.18);
text-align:center;
max-width:90%;
}

.open-btn{
border:none;
padding:15px 25px;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#6e2943;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.open-btn:hover{
transform:scale(1.05);
}

.hidden{
opacity:0;
transform:translateY(20px);
transition:all .8s ease;
}

.show{
opacity:1;
transform:translateY(0);
}

h1{
font-size:3rem;
color:#5f2438;
margin-bottom:15px;
}

.sub{
font-size:1.2rem;
color:#8a3c59;
}

.hearts-container{
position:absolute;
inset:0;
pointer-events:none;
}

.heart{
position:absolute;
bottom:-30px;
font-size:22px;
animation:rise linear forwards;
}

@keyframes rise{
0%{
transform:translateY(0);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="air.mp4" type="audio/mp4">
</audio>

<div class="hearts-container" id="hearts"></div>

<div class="card">

<button id="openBtn" class="open-btn">
✨ Open your surprise
</button>

<div id="surprise" class="hidden">

<h1>Happy Birthday Fati 🎀</h1>

<p id="message" class="sub"></p>

</div>

</div>

<script>

const btn = document.getElementById("openBtn")
const surprise = document.getElementById("surprise")
const msg = document.getElementById("message")
const music = document.getElementById("bgMusic")

const text =
"hadi surprise sghira 🎂 tmanit lik nhar zwin w 3am sa3id 🎉"

btn.onclick = ()=>{

btn.style.display="none"

surprise.classList.add("show")

music.volume=0
music.play()

let v=0

let fade=setInterval(()=>{
if(v<0.5){
v+=0.02
music.volume=v
}else{
clearInterval(fade)
}
},200)

let i=0

function type(){
if(i<text.length){
msg.innerHTML+=text.charAt(i)
i++
setTimeout(type,40)
}
}

type()

}

const heartsContainer=document.getElementById("hearts")

function heart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"

h.style.fontSize=(20+Math.random()*20)+"px"

h.style.animationDuration=(4+Math.random()*3)+"s"

heartsContainer.appendChild(h)

setTimeout(()=>{
h.remove()
},7000)

}

setInterval(heart,400)

</script>

</body>
</html>
