<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Fati</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      font-family:"Poppins", sans-serif;
      background:url("bg.jpg") center center / cover no-repeat;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(255, 220, 232, 0.10);
      z-index:0;
      pointer-events:none;
    }

    .site{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:2;
      opacity:0;
      visibility:hidden;
      transition:opacity .9s ease;
    }

    .site.show{
      opacity:1;
      visibility:visible;
    }

    .background-glow{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.14), transparent 18%),
        radial-gradient(circle at 84% 20%, rgba(255,255,255,0.1), transparent 18%),
        radial-gradient(circle at 50% 84%, rgba(255,255,255,0.08), transparent 24%);
      filter:blur(16px);
      z-index:1;
    }

    .sparkle{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(255,255,255,0.95);
      box-shadow:0 0 10px rgba(255,255,255,0.95);
      animation:sparkle 2.7s infinite ease-in-out;
      pointer-events:none;
      z-index:2;
    }

    .sparkle:nth-child(1){ top:10%; left:10%; animation-delay:0s; }
    .sparkle:nth-child(2){ top:18%; left:87%; animation-delay:.8s; }
    .sparkle:nth-child(3){ top:82%; left:14%; animation-delay:1.6s; }
    .sparkle:nth-child(4){ top:76%; left:88%; animation-delay:2.2s; }

    .card{
      position:relative;
      z-index:4;
      width:min(90vw, 340px);
      height:min(78vh, 500px);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card-img{
      width:100%;
      height:auto;
      display:block;
    }

    .card-content{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      padding:150px 42px 120px 42px;
    }

    .title{
      font-size:clamp(1.9rem, 7vw, 2.7rem);
      color:#6d2d43;
      font-weight:700;
      line-height:1.02;
      text-shadow:0 3px 10px rgba(255,255,255,0.15);
    }

    .fati{
      display:block;
      margin-top:2px;
      font-family:"Great Vibes", cursive;
      font-size:1.3em;
      color:#ff5ca8;
      text-shadow:
        0 0 10px rgba(255,112,179,0.24),
        0 0 18px rgba(255,158,209,0.16);
    }

    .bow{
      display:block;
      margin-top:4px;
      font-size:1em;
    }

    .sub{
      margin-top:16px;
      min-height:72px;
      max-width:210px;
      font-size:clamp(.85rem, 3.5vw, .95rem);
      color:#91506a;
      line-height:1.7;
      font-weight:500;
      white-space:pre-wrap;
      margin-left:auto;
      margin-right:auto;
      text-shadow:
        0 0 3px #ffffff,
        0 0 6px #ffffff;
    }

    .hidden{
      display:none;
    }

    .heart{
      position:fixed;
      bottom:-40px;
      z-index:3;
      pointer-events:none;
      user-select:none;
      opacity:.9;
      animation:rise linear forwards;
      filter:drop-shadow(0 7px 10px rgba(255, 91, 146, 0.18));
    }

    .click-heart{
      position:fixed;
      z-index:8;
      pointer-events:none;
      user-select:none;
      animation:popUp 1.5s ease-out forwards;
      filter:drop-shadow(0 7px 10px rgba(255, 91, 146, 0.22));
    }

    .happy-cat{
      position:fixed;
      bottom:14px;
      left:50%;
      transform:translateX(-50%);
      width:min(28vw, 100px);
      z-index:7;
      display:none;
      pointer-events:none;
    }

    /* INTRO PINK */
    .intro-screen{
      position:fixed;
      inset:0;
      background:linear-gradient(180deg, #f7bfd4, #f4aac7, #ef9ec0);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:50;
      overflow:hidden;
      transition:opacity .9s ease, visibility .9s ease;
    }

    .intro-screen.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .star-wrap{
      position:relative;
      width:190px;
      height:190px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:26px;
    }

    .star{
      width:115px;
      height:115px;
      background:#fff7fb;
      clip-path:polygon(
        50% 0%,
        63% 37%,
        100% 50%,
        63% 63%,
        50% 100%,
        37% 63%,
        0% 50%,
        37% 37%
      );
      box-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 50px rgba(255,220,240,0.30);
      animation:starPulse 2s ease-in-out infinite;
      transition:transform .8s ease, opacity .8s ease;
    }

    .star.expand{
      transform:scale(8);
      opacity:0;
    }

    .intro-title{
      color:#fff8fc;
      font-size:21px;
      font-weight:700;
      text-align:center;
      margin-bottom:16px;
      text-shadow:0 0 16px rgba(255,255,255,0.20);
      transition:opacity .5s ease;
    }

    .intro-message{
      color:#fff8fc;
      font-size:16px;
      font-weight:500;
      text-align:center;
      margin-bottom:20px;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .5s ease, transform .5s ease;
      text-shadow:0 0 14px rgba(255,255,255,0.18);
    }

    .intro-message.show{
      opacity:1;
      transform:translateY(0);
    }

    .open-btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:14px 24px;
      border-radius:999px;
      font-size:16px;
      font-weight:600;
      font-family:"Poppins", sans-serif;
      color:#a03f67;
      background:#fff5fa;
      box-shadow:0 10px 24px rgba(120, 45, 77, 0.18);
      transition:transform .2s ease, box-shadow .2s ease, opacity .4s ease;
    }

    .open-btn:hover{
      transform:scale(1.04);
      box-shadow:0 14px 28px rgba(120, 45, 77, 0.24);
    }

    @keyframes starPulse{
      0%,100%{
        transform:scale(.92);
        opacity:.9;
      }
      50%{
        transform:scale(1.08);
        opacity:1;
      }
    }

    @keyframes rise{
      0%{
        transform:translateY(0) scale(.8) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform:translateY(-115vh) scale(1.2) rotate(18deg);
        opacity:0;
      }
    }

    @keyframes popUp{
      0%{
        transform:translate(-50%,-50%) scale(.35);
        opacity:1;
      }
      100%{
        transform:translate(-50%,-160px) scale(1.5) rotate(18deg);
        opacity:0;
      }
    }

    @keyframes sparkle{
      0%,100%{
        transform:scale(.7);
        opacity:.3;
      }
      50%{
        transform:scale(1.3);
        opacity:1;
      }
    }

    @media (max-width:480px){
      .card{
        width:92vw;
        height:76vh;
      }

      .card-content{
        padding:145px 36px 115px 36px;
      }

      .title{
        font-size:2.35rem;
      }

      .sub{
        max-width:200px;
        font-size:.95rem;
      }

      .open-btn{
        font-size:14px;
        padding:12px 18px;
      }

      .happy-cat{
        width:90px;
        bottom:10px;
      }

      .star-wrap{
        width:150px;
        height:150px;
      }

      .star{
        width:100px;
        height:100px;
      }

      .intro-title{
        font-size:18px;
      }

      .intro-message{
        font-size:14px;
      }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" preload="auto">
    <source src="air.mp4" type="audio/mp4">
  </audio>

  <!-- INTRO -->
  <div id="introScreen" class="intro-screen">
    <div class="star-wrap">
      <div id="introStar" class="star"></div>
    </div>
    <div class="intro-title">A little surprise for you ✨</div>
    <div id="introMessage" class="intro-message">ready? 💖</div>
    <button id="openBtn" class="open-btn">Open your surprise</button>
  </div>

  <!-- SITE -->
  <div id="site" class="site">
    <div class="background-glow"></div>

    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="card">
      <img src="card.png" class="card-img" alt="card">

      <div id="surpriseBox" class="card-content hidden">
        <h1 class="title">
          Happy Birthday
          <span class="fati">Fati</span>
          <span class="bow">🎀</span>
        </h1>

        <p id="typedText" class="sub"></p>
      </div>
    </div>
  </div>

  <img id="happyCat" src="happy-cat.gif" class="happy-cat">

  <script>
    const openBtn = document.getElementById("openBtn");
    const introScreen = document.getElementById("introScreen");
    const introStar = document.getElementById("introStar");
    const introMessage = document.getElementById("introMessage");
    const site = document.getElementById("site");
    const surpriseBox = document.getElementById("surpriseBox");
    const typedText = document.getElementById("typedText");
    const bgMusic = document.getElementById("bgMusic");
    const happyCat = document.getElementById("happyCat");

    const floatingHearts = ["💖","💗","💘","💕","💓","💞","💝","🩷","❤️"];
    const clickHearts = ["💖","💘","💕","💗","💓","🩷","❤️","💞"];

    const message = "hadi surprise sghira 🎂\ntmanit lik nhar zwin w 3am zwin bhalk ❤️";

    let surpriseOpened = false;

    function createFloatingHeart(){
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = floatingHearts[Math.floor(Math.random() * floatingHearts.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 16) + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      heart.style.opacity = 0.45 + Math.random() * 0.55;
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8500);
    }

    setInterval(createFloatingHeart, 380);

    function createClickHearts(x, y, count = 6){
      for(let i = 0; i < count; i++){
        const heart = document.createElement("div");
        heart.className = "click-heart";
        heart.innerHTML = clickHearts[Math.floor(Math.random() * clickHearts.length)];
        heart.style.left = (x + (Math.random() * 60 - 30)) + "px";
        heart.style.top = (y + (Math.random() * 20 - 10)) + "px";
        heart.style.fontSize = (16 + Math.random() * 12) + "px";
        heart.style.animationDuration = (1 + Math.random() * 0.5) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 1600);
      }
    }

    function typeMessage(text){
      typedText.textContent = "";
      let i = 0;

      function type(){
        if(i < text.length){
          typedText.textContent += text.charAt(i);
          i++;
          setTimeout(type, 40);
        }
      }

      type();
    }

    function playMusicWithFade(){
      bgMusic.volume = 0;
      bgMusic.play().catch(() => {});

      let volume = 0;
      const fade = setInterval(() => {
        if(volume < 0.42){
          volume += 0.02;
          bgMusic.volume = volume;
        } else {
          clearInterval(fade);
        }
      }, 220);
    }

    openBtn.addEventListener("click", function(e){
      e.stopPropagation();

      if(surpriseOpened) return;
      surpriseOpened = true;

      openBtn.style.opacity = "0";
      introMessage.classList.add("show");
      introStar.classList.add("expand");

      setTimeout(() => {
        introScreen.classList.add("hide");
        site.classList.add("show");
        surpriseBox.classList.remove("hidden");
        happyCat.style.display = "block";
        createClickHearts(window.innerWidth / 2, window.innerHeight / 2, 14);
        typeMessage(message);
        playMusicWithFade();
      }, 850);
    });

    document.addEventListener("click", function(e){
      if(!surpriseOpened) return;
      createClickHearts(e.clientX, e.clientY, 5);
    });
  </script>

</body>
</html>
